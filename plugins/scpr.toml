[plugin]
name = "scpr"
alias = ["scpr-rs"]
description = "scpr manages local binaries with pluggable GitHub release installers"
location = "github:ffimnsr/scpr-rs"
asset_pattern = "{name}-{version}-{target}.tar.gz"
checksum_asset_pattern = "{name}-{version}-{target}.tar.gz.sha256"
binary = "{name}-{version}-{target}/scpr"
man_pages = ["{name}-{version}-{target}/man/scpr.1"]

[plugin.targets]
"linux-x86_64" = "x86_64-unknown-linux-musl"
"linux-aarch64" = "aarch64-unknown-linux-musl"
"macos-x86_64" = "x86_64-apple-darwin"
"macos-aarch64" = "aarch64-apple-darwin"
