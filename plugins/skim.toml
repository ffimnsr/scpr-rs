[plugin]
name = "skim"
alias = ["skim", "sk"]
description = "A fuzzy finder in Rust"
location = "github:lotabout/skim"
asset_pattern = "skim-{target}.tar.xz"
checksum_asset_pattern = "skim-{target}.tar.xz.sha256"
binary = "skim-{target}/sk"
man_pages = ["skim-{target}/man/man1/sk.1"]

[plugin.targets]
"linux-x86_64" = "x86_64-unknown-linux-musl"
"linux-aarch64" = "aarch64-unknown-linux-musl"
"macos-x86_64" = "x86_64-apple-darwin"
"macos-aarch64" = "aarch64-apple-darwin"
