[plugin]
name = "atlas"
alias = ["atlas-context-router", "atlas-context-router-rs"]
description = "Graph-aware code context for CLI and MCP workflows"
location = "github:ffimnsr/atlas-context-router-rs"
asset_pattern = "{name}-{version}-{target}.tar.gz"
checksum_asset_pattern = "{name}-{version}-{target}.tar.gz.sha256"
binary = "{name}-{version}-{target}/atlas"
man_pages = []
post_install = [
	'''
shell_name=$(basename "${SHELL:-}")
case "$shell_name" in
	bash)
		rc_file="$HOME/.bashrc"
		rc_dir="$HOME/.bashrc.d"
		completion_file="$rc_dir/atlas.sh"
		completion_line='eval "$({binary_path} completions bash)"'
		load_pattern='(^|[[:space:]])(source|\.)[[:space:]].*\.bashrc\.d|bashrc\.d/'
		mkdir -p "$rc_dir"
		printf '%s\n' "$completion_line" > "$completion_file"
		touch "$rc_file"
		if grep -Eq "$load_pattern" "$rc_file"; then
			exit 0
		fi
		grep -Fqx "$completion_line" "$rc_file" || printf '\n%s\n' "$completion_line" >> "$rc_file"
		;;
	zsh)
		rc_file="$HOME/.zshrc"
		rc_dir="$HOME/.zshrc.d"
		completion_file="$rc_dir/atlas.sh"
		completion_line='eval "$({binary_path} completions zsh)"'
		load_pattern='(^|[[:space:]])(source|\.)[[:space:]].*\.zshrc\.d|zshrc\.d/'
		mkdir -p "$rc_dir"
		printf '%s\n' "$completion_line" > "$completion_file"
		touch "$rc_file"
		if grep -Eq "$load_pattern" "$rc_file"; then
			exit 0
		fi
		grep -Fqx "$completion_line" "$rc_file" || printf '\n%s\n' "$completion_line" >> "$rc_file"
		;;
	fish)
		conf_d="$HOME/.config/fish/completions"
		completion_file="$conf_d/atlas.fish"
		mkdir -p "$conf_d"
		{binary_path} completions fish > "$completion_file"
		;;
	*)
		exit 0
		;;
esac
	'''
]

[plugin.targets]
"linux-x86_64" = "x86_64-unknown-linux-musl"
"macos-aarch64" = "aarch64-apple-darwin"
